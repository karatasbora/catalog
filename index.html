<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BK Catalog</title>
    <meta name="description"
        content="An interactive archive of educational materials and Figma slides by Bora Karataş.">

    <script>
        (function () {
            try {
                document.documentElement.classList.add('js-loading');
                var localTheme = localStorage.getItem('theme-preference');
                var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (localTheme === 'dark' || (!localTheme && sysTheme)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
                setTimeout(function () {
                    document.documentElement.classList.remove('js-loading');
                }, 2000);
            } catch (e) { }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="toolbar-header">
        <div class="toolbar-left">
            <img src="favicon-48.png" alt="Bora Karataş" class="toolbar-avatar">
            <h1 id="ui-title" class="toolbar-title">BK Katalog</h1>
            <span id="item-count" class="item-count-badge"></span>
        </div>

        <div class="toolbar-center">
            <div class="search-wrapper">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search catalog...">
            </div>
            <div class="filter-wrapper">
                <select id="tag-filter" aria-label="Filter by tag">
                    <option value="">All Categories</option>
                </select>
                <svg class="select-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>

        <div class="toolbar-right">
            <div class="toolbar-controls">
                <!-- Home Button -->
                <a href="https://karatasbora.github.io/me" class="btn-icon" aria-label="Home" title="Back to Home">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </a>
                <!-- Contact Button -->
                <button class="btn-icon" id="btn-contact" aria-label="Contact" title="Contact Me">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                </button>
                <!-- Share Button -->
                <button class="btn-icon" id="btn-share" aria-label="Share" title="Share Catalog">
                    <svg id="share-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                </button>
                <span class="separator">|</span>
                <button class="btn-icon" id="btn-theme" aria-label="Toggle Dark Mode" title="Toggle Theme">
                    <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <span class="separator">|</span>
                <button class="btn-icon" id="btn-tr">TR</button>
                <button class="btn-icon" id="btn-en">EN</button>
            </div>
        </div>
    </header>

    <main id="main-content">
        <section>
            <div id="slide-grid">
                <!-- Data populated dynamically via app.js overriding main styles -->
            </div>
        </section>
    </main>

    <div id="figma-modal" class="modal hidden">
        <div class="modal-header">
            <button id="close-modal" class="btn-icon">✖ Close</button>
        </div>
        <div class="modal-body" id="modal-iframe-container">
        </div>
    </div>

    <!-- Contact Modal -->
    <div id="contact-modal" class="modal content-modal hidden">
        <div class="modal-header">
            <button id="close-contact" class="btn-icon">✖</button>
        </div>
        <div class="modal-body" style="text-align: center;">
            <h2 class="modal-title" id="contact-title" style="margin-top:0; border:none; padding:0;">Let's Connect</h2>
            <p class="modal-subtitle" id="contact-subtitle">Find me on these platforms or drop me an email.</p>
            
            <div class="social-share-row" style="margin-top: 24px;">
                <a href="mailto:borakaratas@anadolu.edu.tr" class="social-circle-btn" aria-label="Email Me">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </a>
                <a href="https://www.linkedin.com/in/borakaratas/" target="_blank" rel="noopener noreferrer" class="social-circle-btn" aria-label="LinkedIn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                </a>
                <a href="https://github.com/karatasbora" target="_blank" rel="noopener noreferrer" class="social-circle-btn" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div id="share-modal" class="modal content-modal hidden">
        <div class="modal-header">
            <button id="close-share" class="btn-icon">✖</button>
        </div>
        <div class="modal-body" style="text-align: center;">
            <h2 class="modal-title" id="share-title" style="margin-top:0; border:none; padding:0;">Share Catalog</h2>
            <p class="modal-subtitle" id="share-subtitle">Share this catalog with others via a direct link.</p>
            
            <div class="share-link-box">
                <div class="share-url" id="share-url-text">https://...</div>
            </div>
            
            <button class="modal-action-btn" id="copy-link-btn">Copy Link</button>

            <!-- Functional share icons attached via app.js -->
            <div class="social-share-row">
                <a href="#" id="share-twitter" class="social-circle-btn" aria-label="Share on Twitter" target="_blank" rel="noopener noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4.01c-1 .49-1.98.689-3 .99-1.121-1.265-2.783-1.335-4.38-.737S11.977 6.323 12 8v1c-3.245.083-6.135-1.395-8-4 0 0-4.182 7.433 4 11-1.872 1.247-3.739 2.088-6 2 3.308 1.803 6.913 2.423 10.034 1.517 3.58-1.04 6.522-3.723 7.651-7.742a13.84 13.84 0 0 0 .497-3.753C20.18 7.773 21.692 5.25 22 4.009z"></path></svg>
                </a>
                <a href="#" id="share-linkedin" class="social-circle-btn" aria-label="Share on LinkedIn" target="_blank" rel="noopener noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                </a>
                <a href="#" id="share-whatsapp" class="social-circle-btn" aria-label="Share on WhatsApp" target="_blank" rel="noopener noreferrer">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
