<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Archive | Bora Karataş</title>
    <meta name="description" content="An interactive archive of educational materials and Figma slides by Bora Karataş.">
    
    <script>
        (function () {
            try {
                document.documentElement.classList.add('js-loading');
                var localTheme = localStorage.getItem('theme-preference');
                var sysTheme = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (localTheme === 'dark' || (!localTheme && sysTheme)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
                setTimeout(function () {
                    document.documentElement.classList.remove('js-loading');
                }, 2000);
            } catch (e) { }
        })();
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-text">
            <h1 id="ui-title">Educational Materials Archive</h1>
            <div class="headline" id="ui-subtitle">Interactive Figma Slides</div>
            
            <div class="contact-info">
                <a href="https://karatasbora.github.io/me" id="ui-back" class="contact-link">← Back to Resume</a>
                <span class="sep">|</span>
                <a href="mailto:borakaratas@anadolu.edu.tr" class="contact-link">borakaratas@anadolu.edu.tr</a>
            </div>
        </div>

        <nav class="controls">
            <button class="btn-icon" id="btn-theme" aria-label="Toggle Dark Mode">
                <svg id="moon-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
            <span class="separator">|</span>
            <button class="btn-icon" id="btn-tr">TR</button>
            <button class="btn-icon" id="btn-en">EN</button>
        </nav>
    </header>

    <main id="main-content">
        <section>
            <div id="slide-grid">
                <!-- Data populated dynamically via app.js overriding main styles -->
            </div>
        </section>
    </main>
    
    <div id="figma-modal" class="modal hidden">
        <div class="modal-header">
            <button id="close-modal" class="btn-icon">✖ Close</button>
        </div>
        <div class="modal-body" id="modal-iframe-container">
        </div>
    </div>
    
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
